<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1C3A2B">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Furgoni TF">
<title>Scadenze Furgoni Frigo — TF s.n.c.</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --verde: #1C3A2B;
    --verde-chiaro: #2d5a42;
    --oro: #C8A84B;
    --crema: #F7F2E8;
    --crema-scura: #e8e0d0;
    --bianco: #ffffff;
    --grigio: #6b6b66;
    --fumo: #2C2C2A;
    --ok: #16a34a;
    --warn: #ca8a04;
    --exp: #dc2626;
    --ok-bg: #f0fdf4;
    --warn-bg: #fefce8;
    --exp-bg: #fef2f2;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--crema);
    color: var(--fumo);
    line-height: 1.5;
    padding-bottom: 80px;
  }

  .container { max-width: 720px; margin: 0 auto; }

  /* HEADER */
  .header {
    background: var(--verde);
    padding: 20px 18px 18px;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .header-title { font-size: 18px; color: var(--crema); font-weight: 600; }
  .header-title span { color: var(--oro); }
  .header-date { font-size: 11px; color: rgba(247,242,232,0.6); }
  .header-sub { font-size: 11px; color: rgba(247,242,232,0.5); }

  /* ALERT */
  .alert {
    margin: 14px 18px 0;
    border-radius: 8px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
  }
  .alert.danger { background: var(--exp-bg); border: 1px solid #fecaca; color: #991b1b; }
  .alert.ok { background: var(--ok-bg); border: 1px solid #bbf7d0; color: #166534; }
  .alert-icon { font-size: 18px; flex-shrink: 0; }

  /* TABS */
  .tabs { display: flex; gap: 6px; padding: 14px 14px 0; }
  .tab {
    flex: 1;
    padding: 12px 6px;
    border: 1px solid var(--crema-scura);
    border-bottom: none;
    border-radius: 10px 10px 0 0;
    background: var(--bianco);
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    position: relative;
  }
  .tab.on { background: var(--verde); border-color: var(--verde); }
  .tab-icon { font-size: 22px; margin-bottom: 4px; }
  .tab-name { font-size: 11px; font-weight: 600; color: var(--fumo); }
  .tab.on .tab-name { color: var(--crema); }
  .tab-plate { font-size: 9px; color: var(--grigio); margin-top: 1px; }
  .tab.on .tab-plate { color: var(--oro); }
  .tab-badge {
    position: absolute;
    top: 6px; right: 6px;
    background: var(--exp);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    min-width: 16px;
    height: 16px;
    border-radius: 999px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
  }

  /* PANEL */
  .panel {
    border: 1px solid var(--crema-scura);
    border-radius: 0 0 10px 10px;
    padding: 14px;
    margin: 0 14px 14px;
    background: var(--bianco);
  }

  .veh-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-bottom: 12px;
    border-bottom: 0.5px solid var(--crema-scura);
    margin-bottom: 12px;
  }
  .veh-icon { font-size: 30px; }
  .veh-info { flex: 1; }
  .veh-name { font-size: 14px; font-weight: 600; color: var(--fumo); }
  .veh-detail { font-size: 11px; color: var(--grigio); }
  .veh-edit {
    width: 32px; height: 32px;
    border: 1px solid var(--crema-scura);
    background: var(--bianco);
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }

  /* ITEM */
  .item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 12px;
    border: 0.5px solid var(--crema-scura);
    border-radius: 8px;
    margin-bottom: 8px;
    border-left-width: 4px;
  }
  .item.st-ok { border-left-color: var(--ok); }
  .item.st-warn { border-left-color: var(--warn); }
  .item.st-exp { border-left-color: var(--exp); }
  .item.empty { opacity: 0.5; }

  .item-icon {
    width: 38px; height: 38px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    background: var(--crema);
  }
  .item.st-ok .item-icon { background: var(--ok-bg); }
  .item.st-warn .item-icon { background: var(--warn-bg); }
  .item.st-exp .item-icon { background: var(--exp-bg); }

  .item-body { flex: 1; min-width: 0; }
  .item-name { font-size: 13px; font-weight: 600; color: var(--fumo); }
  .item-type { font-size: 10px; color: var(--grigio); }

  .item-right { text-align: right; flex-shrink: 0; }
  .item-date { font-size: 12px; font-weight: 500; color: var(--fumo); }
  .item-days { font-size: 10px; margin-top: 1px; font-weight: 500; }
  .item.st-ok .item-days { color: var(--ok); }
  .item.st-warn .item-days { color: var(--warn); }
  .item.st-exp .item-days { color: var(--exp); }
  .item-empty-txt { font-size: 10px; color: var(--grigio); font-style: italic; }

  .item-actions { display: flex; gap: 4px; margin-left: 2px; }
  .item-btn {
    width: 28px; height: 28px;
    border: 1px solid var(--crema-scura);
    background: var(--bianco);
    border-radius: 6px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }
  .item-btn:hover { background: var(--crema); }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--verde);
    color: var(--crema);
    border: none;
    border-radius: 999px;
    padding: 14px 24px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(28,58,43,0.3);
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 60;
    font-family: inherit;
    white-space: nowrap;
  }
  .fab:hover { background: var(--verde-chiaro); }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(28,58,43,0.5);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 100;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--bianco);
    border-radius: 16px 16px 0 0;
    width: 100%;
    max-width: 720px;
    padding: 22px 18px 28px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @media (min-width: 600px) {
    .modal-overlay { align-items: center; }
    .modal { border-radius: 16px; max-width: 460px; }
  }
  .modal-title { font-size: 17px; font-weight: 600; color: var(--verde); margin-bottom: 18px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 500; color: var(--fumo); margin-bottom: 5px; }
  .field input, .field select {
    width: 100%;
    padding: 11px 12px;
    border: 1px solid var(--crema-scura);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    color: var(--fumo);
    background: var(--bianco);
    outline: none;
  }
  .field input:focus, .field select:focus { border-color: var(--oro); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    font-family: inherit;
  }
  .btn-cancel { background: var(--crema); color: var(--grigio); }
  .btn-save { background: var(--verde); color: var(--crema); }
  .btn-delete { background: var(--exp-bg); color: var(--exp); border: 1px solid #fecaca; }
  .repeat-note { font-size: 11px; color: var(--grigio); margin-top: 4px; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-top">
      <div class="header-title">Scadenze <span>Veicoli</span></div>
      <div class="header-date" id="today"></div>
    </div>
    <div class="header-sub">TF s.n.c. Distribuzioni Alimentari</div>
      <div style="margin-top:6px;"><button onclick="resetData()" style="background:rgba(247,242,232,0.1);border:1px solid rgba(247,242,232,0.2);color:rgba(247,242,232,0.6);font-size:10px;padding:4px 10px;border-radius:4px;cursor:pointer;font-family:inherit;">↻ Ripristina scadenze di esempio</button></div>
  </div>

  <div id="alert-container"></div>

  <div class="tabs" id="tabs"></div>

  <div class="panel" id="panel"></div>

</div>

<button class="fab" onclick="openModal()">
  <span style="font-size:16px;">+</span> Aggiungi scadenza
</button>

<!-- MODAL SCADENZA -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title">Nuova scadenza</div>
    <div class="field">
      <label>Tipo di scadenza</label>
      <select id="f-type">
        <option value="Assicurazione RCA">🛡️ Assicurazione RCA</option>
        <option value="Revisione">🔧 Revisione</option>
        <option value="Certificazione ATP">❄️ Certificazione ATP</option>
        <option value="Bollo auto">💰 Bollo auto</option>
        <option value="Tagliando">🛠️ Tagliando</option>
        <option value="Manutenzione">⚙️ Manutenzione</option>
        <option value="Altro">📌 Altro</option>
      </select>
    </div>
    <div class="field">
      <label>Note <span style="color:#aaa;font-weight:400;">(facoltativo)</span></label>
      <input type="text" id="f-note" placeholder="es. officina, importo, dettagli">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Data di scadenza</label>
        <input type="date" id="f-date">
      </div>
      <div class="field">
        <label>Ripetizione</label>
        <select id="f-repeat">
          <option value="0">Nessuna</option>
          <option value="6">Ogni 6 mesi</option>
          <option value="12">Ogni anno</option>
          <option value="24">Ogni 2 anni</option>
          <option value="36">Ogni 3 anni</option>
          <option value="72">Ogni 6 anni</option>
        </select>
      </div>
    </div>
    <div class="repeat-note">Con la ripetizione, quando rinnovi una scadenza viene ricalcolata automaticamente.</div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">Annulla</button>
      <button class="btn btn-save" onclick="saveItem()">Salva</button>
    </div>
    <div id="delete-row" style="margin-top:10px;display:none;">
      <button class="btn btn-delete" style="width:100%;" onclick="deleteItem()">Elimina scadenza</button>
    </div>
  </div>
</div>

<!-- MODAL FURGONE -->
<div class="modal-overlay" id="veh-modal-overlay">
  <div class="modal">
    <div class="modal-title">Modifica furgone</div>
    <div class="field">
      <label>Nome / Modello</label>
      <input type="text" id="v-name" placeholder="es. Iveco Daily">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Targa</label>
        <input type="text" id="v-plate" placeholder="es. GA 123 BC">
      </div>
      <div class="field">
        <label>Temperatura frigo</label>
        <input type="text" id="v-temp" placeholder="es. -18°C">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeVehModal()">Annulla</button>
      <button class="btn btn-save" onclick="saveVeh()">Salva</button>
    </div>
  </div>
</div>

<script>
  var WARN_DAYS = 30;
  var STORAGE_KEY = 'tf_furgoni_scadenze_v2';
  var data = null;
  var curVeh = 0;
  var editId = null;

  var TYPE_ICONS = {
    'Assicurazione RCA': '🛡️',
    'Revisione': '🔧',
    'Certificazione ATP': '❄️',
    'Bollo auto': '💰',
    'Tagliando': '🛠️',
    'Manutenzione': '⚙️',
    'Altro': '📌'
  };

  var TYPE_DESC = {
    'Assicurazione RCA': 'Polizza annuale',
    'Revisione': 'Revisione ministeriale',
    'Certificazione ATP': 'Trasporto refrigerato',
    'Bollo auto': 'Tassa di possesso',
    'Tagliando': 'Tagliando periodico',
    'Manutenzione': 'Manutenzione mezzo',
    'Altro': ''
  };

  var SEED = {
    vehicles: [
      { icon:'🚚', name:'Furgone 1 · Iveco Daily', plate:'GA 123 BC', temp:'-18°C' },
      { icon:'🚛', name:'Furgone 2 · Fiat Ducato', plate:'GB 456 CD', temp:'-18°C' },
      { icon:'🚐', name:'Furgone 3 · Renault Master', plate:'GC 789 DE', temp:'0/+4°C' }
    ],
    items: [
      {id:1, veh:0, type:'Assicurazione RCA', note:'', date:'2026-07-18', repeat:12},
      {id:2, veh:0, type:'Revisione', note:'', date:'2026-11-10', repeat:24},
      {id:3, veh:0, type:'Certificazione ATP', note:'', date:'2027-03-22', repeat:36},
      {id:4, veh:0, type:'Bollo auto', note:'', date:'2026-12-31', repeat:12},
      {id:5, veh:0, type:'Tagliando', note:'Officina Rossi', date:'2026-10-05', repeat:12},
      {id:6, veh:1, type:'Assicurazione RCA', note:'', date:'2026-09-14', repeat:12},
      {id:7, veh:1, type:'Revisione', note:'', date:'2026-08-20', repeat:24},
      {id:8, veh:1, type:'Certificazione ATP', note:'', date:'2026-06-10', repeat:36},
      {id:9, veh:1, type:'Bollo auto', note:'', date:'2026-12-31', repeat:12},
      {id:14, veh:1, type:'Tagliando', note:'', date:'2026-09-01', repeat:12},
      {id:10, veh:2, type:'Assicurazione RCA', note:'', date:'2027-01-22', repeat:12},
      {id:11, veh:2, type:'Revisione', note:'', date:'2027-02-15', repeat:24},
      {id:12, veh:2, type:'Certificazione ATP', note:'', date:'2027-05-30', repeat:36},
      {id:13, veh:2, type:'Bollo auto', note:'', date:'2026-12-31', repeat:12},
      {id:15, veh:2, type:'Tagliando', note:'', date:'2027-01-10', repeat:12}
    ]
  };

  function load() {
    try {
      var saved = localStorage.getItem(STORAGE_KEY);
      data = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(SEED));
      if (!saved) save();
    } catch(e) { data = JSON.parse(JSON.stringify(SEED)); }
  }

  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e){}
  }

  function daysUntil(dateStr) {
    var today = new Date(); today.setHours(0,0,0,0);
    var d = new Date(dateStr); d.setHours(0,0,0,0);
    return Math.round((d - today) / 86400000);
  }
  function statusOf(dateStr) {
    var days = daysUntil(dateStr);
    if (days < 0) return 'exp';
    if (days <= WARN_DAYS) return 'warn';
    return 'ok';
  }
  function fmtDate(dateStr) {
    return new Date(dateStr).toLocaleDateString('it-IT', {day:'2-digit',month:'2-digit',year:'numeric'});
  }
  function daysLabel(dateStr) {
    var days = daysUntil(dateStr);
    if (days < 0) return 'Scaduta da ' + Math.abs(days) + ' gg';
    if (days === 0) return 'Scade oggi';
    if (days === 1) return 'Scade domani';
    return 'Tra ' + days + ' giorni';
  }
  function repeatLabel(m) {
    if (m == 6) return '6 mesi';
    if (m == 12) return 'anno';
    if (m == 24) return '2 anni';
    if (m == 36) return '3 anni';
    if (m == 72) return '6 anni';
    return m + ' mesi';
  }

  function vehUrgentCount(vi) {
    return data.items.filter(function(it){
      return it.veh === vi && statusOf(it.date) !== 'ok';
    }).length;
  }

  function render() {
    var today = new Date();
    document.getElementById('today').textContent = 'Oggi: ' + today.toLocaleDateString('it-IT', {day:'2-digit',month:'2-digit',year:'numeric'});

    // Global alert
    var allUrgent = data.items.filter(function(it){ return statusOf(it.date) !== 'ok'; });
    var alertC = document.getElementById('alert-container');
    if (allUrgent.length > 0) {
      var msgs = [];
      data.vehicles.forEach(function(v, vi){
        var exp = data.items.filter(function(it){ return it.veh===vi && statusOf(it.date)==='exp'; });
        var warn = data.items.filter(function(it){ return it.veh===vi && statusOf(it.date)==='warn'; });
        if (exp.length) msgs.push('<strong>' + v.name.split(' · ')[0] + '</strong>: ' + exp[0].type + ' scaduta');
        else if (warn.length) msgs.push('<strong>' + v.name.split(' · ')[0] + '</strong>: ' + warn[0].type + ' in scadenza');
      });
      alertC.innerHTML = '<div class="alert danger"><span class="alert-icon">⚠️</span><span>' + msgs.slice(0,2).join(' · ') + '</span></div>';
    } else {
      alertC.innerHTML = '<div class="alert ok"><span class="alert-icon">✅</span><span>Tutti i furgoni sono in regola!</span></div>';
    }

    // Tabs
    var tabsEl = document.getElementById('tabs');
    tabsEl.innerHTML = data.vehicles.map(function(v, vi){
      var urgent = vehUrgentCount(vi);
      return '<div class="tab' + (vi===curVeh?' on':'') + '" onclick="selectVeh(' + vi + ')">' +
        (urgent>0 ? '<div class="tab-badge">' + urgent + '</div>' : '') +
        '<div class="tab-icon">' + v.icon + '</div>' +
        '<div class="tab-name">' + v.name.split(' · ')[0] + '</div>' +
        '<div class="tab-plate">' + v.plate + '</div>' +
      '</div>';
    }).join('');

    // Panel
    var v = data.vehicles[curVeh];
    var TYPE_ORDER = ['Assicurazione RCA', 'Tagliando', 'Revisione', 'Bollo auto', 'Certificazione ATP', 'Manutenzione', 'Altro'];
    var vehItems = data.items.filter(function(it){ return it.veh === curVeh; })
      .sort(function(a,b){
        var ia = TYPE_ORDER.indexOf(a.type); if (ia < 0) ia = 99;
        var ib = TYPE_ORDER.indexOf(b.type); if (ib < 0) ib = 99;
        if (ia !== ib) return ia - ib;
        return new Date(a.date) - new Date(b.date);
      });

    var panelEl = document.getElementById('panel');
    var html = '<div class="veh-header">' +
      '<span class="veh-icon">' + v.icon + '</span>' +
      '<div class="veh-info">' +
        '<div class="veh-name">' + v.name + '</div>' +
        '<div class="veh-detail">Targa ' + v.plate + ' · Frigo ' + v.temp + '</div>' +
      '</div>' +
      '<button class="veh-edit" onclick="openVehModal()" title="Modifica furgone">✏️</button>' +
    '</div>';

    if (vehItems.length === 0) {
      html += '<div style="text-align:center;padding:24px;color:var(--grigio);font-size:13px;">Nessuna scadenza per questo furgone.<br>Aggiungine una col pulsante in basso.</div>';
    } else {
      html += vehItems.map(function(it){
        var st = statusOf(it.date);
        var icon = TYPE_ICONS[it.type] || '📌';
        var desc = it.note || TYPE_DESC[it.type] || '';
        return '<div class="item st-' + st + '">' +
          '<div class="item-icon">' + icon + '</div>' +
          '<div class="item-body">' +
            '<div class="item-name">' + it.type + '</div>' +
            '<div class="item-type">' + desc + (it.repeat>0 ? ' · ogni ' + repeatLabel(it.repeat) : '') + '</div>' +
          '</div>' +
          '<div class="item-right">' +
            '<div class="item-date">' + fmtDate(it.date) + '</div>' +
            '<div class="item-days">' + daysLabel(it.date) + '</div>' +
          '</div>' +
          '<div class="item-actions">' +
            '<button class="item-btn" onclick="addToCalendar(' + it.id + ')" title="Aggiungi a Google Calendar">📅</button>' +
            (it.repeat>0 ? '<button class="item-btn" onclick="renewItem(' + it.id + ')" title="Rinnova">✓</button>' : '') +
            '<button class="item-btn" onclick="openModal(' + it.id + ')" title="Modifica">✏️</button>' +
          '</div>' +
        '</div>';
      }).join('');
    }
    panelEl.innerHTML = html;
  }

  function selectVeh(vi) { curVeh = vi; render(); }

  function openModal(id) {
    editId = id || null;
    if (editId) {
      var it = data.items.find(function(x){ return x.id === editId; });
      document.getElementById('modal-title').textContent = 'Modifica scadenza';
      document.getElementById('f-type').value = it.type;
      document.getElementById('f-note').value = it.note || '';
      document.getElementById('f-date').value = it.date;
      document.getElementById('f-repeat').value = it.repeat;
      document.getElementById('delete-row').style.display = 'block';
    } else {
      document.getElementById('modal-title').textContent = 'Nuova scadenza · ' + data.vehicles[curVeh].name.split(' · ')[0];
      document.getElementById('f-type').value = 'Assicurazione RCA';
      document.getElementById('f-note').value = '';
      document.getElementById('f-date').value = '';
      document.getElementById('f-repeat').value = '12';
      document.getElementById('delete-row').style.display = 'none';
    }
    document.getElementById('modal-overlay').classList.add('show');
  }
  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('show');
    editId = null;
  }
  function saveItem() {
    var type = document.getElementById('f-type').value;
    var note = document.getElementById('f-note').value.trim();
    var date = document.getElementById('f-date').value;
    var repeat = parseInt(document.getElementById('f-repeat').value);
    if (!date) { alert('Inserisci la data di scadenza'); return; }

    if (editId) {
      var it = data.items.find(function(x){ return x.id === editId; });
      it.type = type; it.note = note; it.date = date; it.repeat = repeat;
    } else {
      var newId = data.items.length ? Math.max.apply(null, data.items.map(function(x){return x.id;})) + 1 : 1;
      data.items.push({id:newId, veh:curVeh, type:type, note:note, date:date, repeat:repeat});
    }
    save(); closeModal(); render();
  }
  function deleteItem() {
    if (!editId) return;
    if (confirm('Eliminare questa scadenza?')) {
      data.items = data.items.filter(function(x){ return x.id !== editId; });
      save(); closeModal(); render();
    }
  }
  function renewItem(id) {
    var it = data.items.find(function(x){ return x.id === id; });
    if (!it || !it.repeat) return;
    if (confirm('Rinnovare "' + it.type + '"?\nLa prossima scadenza sarà tra ' + repeatLabel(it.repeat) + '.')) {
      var d = new Date(it.date);
      d.setMonth(d.getMonth() + it.repeat);
      it.date = d.toISOString().split('T')[0];
      save(); render();
    }
  }

  function openVehModal() {
    var v = data.vehicles[curVeh];
    document.getElementById('v-name').value = v.name.replace(/^[^·]+· /, '');
    document.getElementById('v-plate').value = v.plate;
    document.getElementById('v-temp').value = v.temp;
    document.getElementById('veh-modal-overlay').classList.add('show');
  }
  function closeVehModal() {
    document.getElementById('veh-modal-overlay').classList.remove('show');
  }
  function saveVeh() {
    var v = data.vehicles[curVeh];
    var name = document.getElementById('v-name').value.trim();
    var plate = document.getElementById('v-plate').value.trim();
    var temp = document.getElementById('v-temp').value.trim();
    var prefix = 'Furgone ' + (curVeh+1);
    v.name = prefix + (name ? ' · ' + name : '');
    v.plate = plate;
    v.temp = temp;
    save(); closeVehModal(); render();
  }

  document.getElementById('modal-overlay').addEventListener('click', function(e){
    if (e.target === this) closeModal();
  });
  document.getElementById('veh-modal-overlay').addEventListener('click', function(e){
    if (e.target === this) closeVehModal();
  });

  function addToCalendar(id) {
    var it = data.items.find(function(x){ return x.id === id; });
    if (!it) return;
    var v = data.vehicles[it.veh];
    var vehName = v.name.split(' · ')[0];

    // Event title
    var title = it.type + ' - ' + vehName + ' (' + v.plate + ')';

    // Date: format YYYYMMDD for all-day event
    var d = new Date(it.date);
    var y = d.getFullYear();
    var m = String(d.getMonth()+1).padStart(2,'0');
    var day = String(d.getDate()).padStart(2,'0');
    var startDate = '' + y + m + day;
    // End date = next day for all-day event
    var d2 = new Date(d); d2.setDate(d2.getDate()+1);
    var endDate = '' + d2.getFullYear() + String(d2.getMonth()+1).padStart(2,'0') + String(d2.getDate()).padStart(2,'0');

    // Details
    var details = 'Scadenza ' + it.type + ' per ' + v.name + ' targa ' + v.plate;
    if (it.note) details += '. Note: ' + it.note;
    details += '. (Promemoria da app Scadenze Veicoli TF)';

    // Build Google Calendar URL
    var url = 'https://calendar.google.com/calendar/render?action=TEMPLATE' +
      '&text=' + encodeURIComponent(title) +
      '&dates=' + startDate + '/' + endDate +
      '&details=' + encodeURIComponent(details) +
      '&reminders=' + encodeURIComponent('POPUP:43200');

    window.open(url, '_blank');
  }

  function resetData() {
    if (confirm('Ripristinare le scadenze di esempio per tutti i veicoli?\nLe modifiche attuali verranno sostituite.')) {
      data = JSON.parse(JSON.stringify(SEED));
      save();
      curVeh = 0;
      render();
    }
  }

  load();
  render();
</script>
</body>
</html>
